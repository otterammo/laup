globs:
  - "**/*.md"
  - "**/*.mdc"
ignores:
  - "**/node_modules/**"
  - "dist/**"
  - "coverage/**"
  - "infra/data/**"

config:
  default: false
  MD001: true
  MD003:
    style: atx
  MD004:
    style: dash
  MD007:
    indent: 2
  MD009: true
  MD010: true
  MD012: true
  MD013: false
  MD022: true
  MD024:
    siblings_only: true
  MD025: true
  MD029:
    style: one
  MD030:
    ul_single: 1
    ol_single: 1
    ul_multi: 1
    ol_multi: 1
  MD031: true
  MD032: true
  MD034: true
  MD040: true
  MD041: true
  MD046:
    style: fenced
  MD047: true
  MD048:
    style: backtick
