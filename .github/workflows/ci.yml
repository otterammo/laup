name: quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: quality/lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate lint warnings allowlist (CIG-002)
        run: pnpm run quality:validate-lint-warnings
      - name: Run lint
        run: pnpm run lint

  typecheck:
    name: quality/typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages needed by checks
        run: pnpm --filter @laup/core --filter @laup/aider --filter @laup/claude-code --filter @laup/codex --filter @laup/copilot --filter @laup/cursor --filter @laup/opencode --filter @laup/config-hub run build
      - name: Run typecheck
        run: pnpm run typecheck

  test:
    name: quality/test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages needed by checks
        run: pnpm --filter @laup/core --filter @laup/aider --filter @laup/claude-code --filter @laup/codex --filter @laup/copilot --filter @laup/cursor --filter @laup/opencode --filter @laup/config-hub run build
      - name: Run tests
        run: pnpm run test:run

  coverage:
    name: quality/coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages needed by checks
        run: pnpm --filter @laup/core --filter @laup/aider --filter @laup/claude-code --filter @laup/codex --filter @laup/copilot --filter @laup/cursor --filter @laup/opencode --filter @laup/config-hub run build
      - name: Run coverage
        run: pnpm run test:run --coverage
        continue-on-error: true # Allow failure until quality gaps are resolved
      - name: Report coverage status
        run: |
          echo "⚠️ Coverage thresholds are enforced but allowed to fail until quality gaps are resolved"
          echo "See quality/gaps.md for remediation tracking"
          echo "New code must meet 90% diff coverage (enforced in pr-coverage workflow)"

  security:
    name: quality/security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Dependency vulnerability scan (CIG-005)
        run: pnpm audit --audit-level=high

  secret_scan:
    name: quality/secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch full history for PR diff scanning
      - name: Secret scan (CIG-005)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional for gitleaks-action

  workflow_lint:
    name: quality/workflow-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint GitHub Actions workflows (CIG-005)
        uses: rhysd/actionlint@v1.7.11

  skip_flake:
    name: quality/skip-flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch full history for trend analysis
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate skip/only markers (CIG-008)
        run: node scripts/validate-skip-only-ci.mjs
      - name: Validate quarantine manifest (CIG-008)
        run: node scripts/validate-quarantine.mjs
      - name: Generate skip/flake report (CIG-008)
        run: node scripts/generate-skip-flake-report.mjs --output quality/skip-flake-latest.json
      - name: Upload skip/flake report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: skip-flake-report
          path: |
            quality/skip-flake-latest.json
            quality/skip-flake-history/

  no_new_debt:
    name: quality/no-new-debt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch full history for diff-aware checks
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages needed by checks
        run: pnpm --filter @laup/core --filter @laup/aider --filter @laup/claude-code --filter @laup/codex --filter @laup/copilot --filter @laup/cursor --filter @laup/opencode --filter @laup/config-hub run build
      - name: Check no-new-debt rule (MIG-002)
        run: node scripts/check-no-new-debt.mjs
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}
